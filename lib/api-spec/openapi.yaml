components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Inventory ─────────────────────────────────────────────────────────────
    InventoryMap:
      type: object
      description: Map of item name to quantity. Keys are item names, values are quantities.
      additionalProperties:
        type: integer
      example:
        "Sofa": 1
        "Queen bed": 2
        "Refrigerator": 1

    # ─── Quote Request ──────────────────────────────────────────────────────────
    QuoteRequest:
      type: object
      properties:
        # Contact
        contactName:
          type: string
        phone:
          type: string
        email:
          type: string
        # Move details
        moveDate:
          type: string
          description: ISO date string or formatted date
        arrivalTimeWindow:
          type: string
          description: "Preferred arrival window, e.g. '8AM–10AM'"
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        secondStop:
          type: string
          description: Optional second stop address
        storageNeeded:
          type: boolean
        storageUnitChoice:
          type: string
          description: "e.g. '5x10', '10x10'"
        additionalNotes:
          type: string
        # Legacy fields (still accepted)
        moveType:
          type: string
          description: "local or long-distance"
        residentialOrCommercial:
          type: string
          description: "residential or commercial"
        originAddress:
          type: string
        destinationAddress:
          type: string
        moveSize:
          type: string
        numberOfRooms:
          type: integer
        packingHelpNeeded:
          type: string
        specialItems:
          type: string
        # Home size
        numberOfBedrooms:
          type: integer
          minimum: 0
        numberOfLivingRooms:
          type: integer
          minimum: 0
        isFullyFurnished:
          type: boolean
        hasGarage:
          type: boolean
        hasOutdoorFurniture:
          type: boolean
        hasStairs:
          type: boolean
        hasHeavyItems:
          type: boolean
        # Piano
        pianoType:
          type: string
          enum: [none, upright, grand]
        pianoFloor:
          type: string
          enum: [ground, stairs]
        # Commercial
        isCommercial:
          type: boolean
          description: "true if this is a commercial move"
        commercialBusinessType:
          type: string
          description: "e.g. Office, Retail Store, Art Gallery, Warehouse, Restaurant/Café, Medical Office, Hotel/Hospitality, Other"
        commercialSizeTier:
          type: string
          enum: [small, medium, large, enterprise]
          description: "small (<500 sqft), medium (500-1000 sqft), large (1000-2500 sqft), enterprise (2500+ sqft)"
        # Service type
        serviceType:
          type: string
          enum: [moving, junk_removal]
          description: "Service type: moving (default) or junk_removal"
        # Junk removal fields
        junkLoadSize:
          type: string
          enum: [small, medium, large, full_truck]
          description: "Junk removal load size"
        junkStairsFlights:
          type: integer
          description: "Number of flights of stairs for junk removal"
        junkHeavyItemsCount:
          type: integer
          description: "Number of heavy items (appliances, couches) for junk removal"
        junkConstructionDebris:
          type: boolean
          description: "Whether junk includes construction debris"
        junkSameDay:
          type: boolean
          description: "Whether same-day junk removal service is requested"
        junkHazardousItems:
          type: boolean
          description: "Whether junk includes hazardous items (paint, chemicals)"
        # Inventory
        inventory:
          $ref: "#/components/schemas/InventoryMap"
        # Boxes
        boxesAlreadyPacked:
          type: integer
        needsPackingMaterials:
          type: boolean
        smallBoxes:
          type: integer
        mediumBoxes:
          type: integer
      required:
        - contactName
        - phone
        - email
        - moveDate
        - pickupAddress
        - dropoffAddress

    # ─── Quote Response ─────────────────────────────────────────────────────────
    QuoteResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [quote_requested, deposit_paid, booked]
          description: "quote_requested | deposit_paid | booked"
        createdAt:
          type: string
        # Pricing results
        crewSize:
          type: integer
        hourlyRate:
          type: number
        estimatedHours:
          type: number
        laborSubtotal:
          type: number
        materialsSubtotal:
          type: number
        pianoSurcharge:
          type: number
        commercialAdjustment:
          type: number
          description: "Amount added above residential estimate for commercial moves"
        mountedTVFee:
          type: number
          description: "Per-TV wall-mounted TV dismount/remount surcharge (count × $50/TV); included in totalEstimate"
        totalEstimate:
          type: number
        depositAmount:
          type: number
        serviceType:
          type: string
          enum: [moving, junk_removal]
          description: "Service type: moving or junk_removal"
        junkLoadSize:
          type: string
          enum: [small, medium, large, full_truck]
        junkStairsFlights:
          type: integer
        junkHeavyItemsCount:
          type: integer
        junkConstructionDebris:
          type: boolean
        junkSameDay:
          type: boolean
        junkHazardousItems:
          type: boolean
        junkBasePrice:
          type: number
        junkAddonsTotal:
          type: number
        # Legacy compat
        estimatedPriceLow:
          type: number
        estimatedPriceHigh:
          type: number
        # Booking detail confirmations (echoed back so the deposit page can
        # surface them for the customer)
        packingDate:
          type: string
          nullable: true
        packingArrivalWindow:
          type: string
          nullable: true
        hasMountedTVs:
          type: boolean
        mountedTVCount:
          type: integer
        parkingInstructions:
          type: string
          nullable: true
        # Full request echo
        quoteRequest:
          $ref: "#/components/schemas/QuoteRequestEcho"
      required:
        - id
        - status
        - createdAt
        - quoteRequest

    QuoteRequestEcho:
      type: object
      description: Echo of the quote request fields as stored
      properties:
        contactName:
          type: string
        phone:
          type: string
        email:
          type: string
        moveDate:
          type: string
        arrivalTimeWindow:
          type: string
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        secondStop:
          type: string
        storageNeeded:
          type: boolean
        storageUnitChoice:
          type: string
        additionalNotes:
          type: string
        moveType:
          type: string
        residentialOrCommercial:
          type: string
        originAddress:
          type: string
        destinationAddress:
          type: string
        numberOfBedrooms:
          type: integer
        numberOfLivingRooms:
          type: integer
        isFullyFurnished:
          type: boolean
        hasGarage:
          type: boolean
        hasOutdoorFurniture:
          type: boolean
        hasStairs:
          type: boolean
        hasHeavyItems:
          type: boolean
        pianoType:
          type: string
