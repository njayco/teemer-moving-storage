openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Teemer Moving & Storage API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: quotes
    description: Quote request operations
  - name: jobs
    description: Moving job operations
  - name: contact
    description: Contact form operations
  - name: admin
    description: Admin operations
  - name: captain
    description: Move captain operations
  - name: contracts
    description: Digital contract operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Not authenticated
  /auth/users:
    post:
      operationId: createUser
      tags: [auth]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "403":
          description: Admin access required
        "409":
          description: Email already exists
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserListItem"
        "403":
          description: Admin access required
  /quotes:
    post:
      operationId: submitQuoteRequest
      tags: [quotes]
      summary: Submit a quote request
      description: Submit a moving quote request from a customer. Runs the pricing engine and returns the calculated estimate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
      responses:
        "201":
          description: Quote request submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
    get:
      operationId: listQuoteRequests
      tags: [quotes]
      summary: List all quote requests
      description: Get all quote requests (admin only)
      responses:
        "200":
          description: List of quote requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuoteResponse"
  /quotes/{id}:
    get:
      operationId: getQuoteRequest
      tags: [quotes]
      summary: Get a single quote request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "404":
          description: Quote not found
  /quotes/estimate-boxes:
    post:
      operationId: estimateBoxes
      tags: [quotes]
      summary: AI box count estimation
      description: Uses OpenAI to estimate the number of small and medium boxes needed based on home size and inventory selections.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateBoxesRequest"
      responses:
        "200":
          description: Box count estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateBoxesResponse"
        "503":
          description: AI estimation not configured
  /quotes/{id}/checkout:
    post:
      operationId: createCheckoutSession
      tags: [quotes]
      summary: Create Stripe Checkout Session for deposit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stripe Checkout Session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeCheckoutResponse"
        "404":
          description: Quote not found
        "503":
          description: Payment not configured
  /stripe/webhook:
    post:
      operationId: stripeWebhook
      tags: [quotes]
      summary: Stripe webhook endpoint
      description: Receives Stripe payment events and updates quote status to deposit_paid.
      responses:
        "200":
          description: Webhook received
  /quotes/{id}/status:
    patch:
      operationId: updateQuoteStatus
      tags: [quotes]
      summary: Update a quote request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteStatusRequest"
      responses:
        "200":
          description: Quote status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List available moving jobs
      description: Get jobs with optional status filter and text search
      parameters:
        - name: status
          in: query
          description: Filter by job status (e.g. pending, scheduled, in_progress, complete, cancelled)
          schema:
            type: string
        - name: search
          in: query
          description: Search by customer name, job ID, address, date, or assigned mover
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a moving job
      description: Create a new moving job from a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a specific job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    patch:
      operationId: updateJobStatus
      tags: [jobs]
      summary: Update job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobStatusRequest"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /contact:
    post:
      operationId: submitContactForm
      tags: [contact]
      summary: Submit contact form
      description: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactFormRequest"
      responses:
        "201":
          description: Contact form submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormResponse"
  /admin/email-logs/quote/{quoteId}:
    get:
      operationId: getEmailLogsByQuote
      tags: [admin]
      summary: Get email logs for a quote
      description: Returns email send history for a specific quote (admin only)
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of email logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailLog"
        "403":
          description: Admin access required
  /admin/email-logs/{jobId}:
    get:
      operationId: getEmailLogs
      tags: [admin]
      summary: Get email logs by job ID
      description: Returns email send history for a specific job (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of email logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailLog"
        "403":
          description: Admin access required
  /admin/settings/alert-emails:
    get:
      operationId: getAlertEmailSettings
      tags: [admin]
      summary: Get same-day alert email recipients
      description: Returns the list of email addresses that receive same-day job alerts (admin only)
      responses:
        "200":
          description: Alert email settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertEmailSettings"
        "403":
          description: Admin access required
    put:
      operationId: updateAlertEmailSettings
      tags: [admin]
      summary: Update same-day alert email recipients
      description: Sets the list of email addresses that receive same-day job alerts (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertEmailSettings"
      responses:
        "200":
          description: Updated alert email settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertEmailSettings"
        "400":
          description: Invalid email addresses
        "403":
          description: Admin access required
  /admin/discount-codes:
    get:
      operationId: listDiscountCodes
      tags: [admin]
      summary: List all discount codes
      description: Returns every discount code in the system (admin only)
      responses:
        "200":
          description: List of discount codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscountCode"
        "403":
          description: Admin access required
    post:
      operationId: createDiscountCode
      tags: [admin]
      summary: Create a discount code
      description: Creates a new discount code (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiscountCodeRequest"
      responses:
        "201":
          description: Created discount code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountCode"
        "400":
          description: Invalid request body
        "403":
          description: Admin access required
        "409":
          description: A discount code with this code already exists
  /admin/discount-codes/{id}:
    patch:
      operationId: updateDiscountCode
      tags: [admin]
      summary: Update a discount code
      description: Update an existing discount code (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDiscountCodeRequest"
      responses:
        "200":
          description: Updated discount code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountCode"
        "400":
          description: Invalid request body
        "403":
          description: Admin access required
        "404":
          description: Discount code not found
    delete:
      operationId: deleteDiscountCode
      tags: [admin]
      summary: Delete a discount code
      description: Permanently removes a discount code (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deletion confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDiscountCodeResponse"
        "403":
          description: Admin access required
        "404":
          description: Discount code not found
  /jobs/{jobId}/events:
    get:
      operationId: getJobEvents
      tags: [jobs]
      summary: Get job timeline events (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
        - name: customerOnly
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobStatusEvent"
        "403":
          description: Admin access required
        "404":
          description: Job not found
    post:
      operationId: createJobEvent
      tags: [jobs]
      summary: Create a job timeline event (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobEventRequest"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatusEvent"
        "403":
          description: Admin access required
        "404":
          description: Job not found
  /jobs/{jobId}/send-invoice:
    post:
      operationId: sendJobInvoice
      tags: [jobs]
      summary: Send remaining balance invoice to customer (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: No customer email or bad request
        "403":
          description: Admin access required
        "404":
          description: Job not found
  /jobs/{jobId}/email-customer:
    post:
      operationId: emailJobCustomer
      tags: [jobs]
      summary: Send email to job customer (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                subject:
                  type: string
                message:
                  type: string
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: No customer email or bad request
        "403":
          description: Admin access required
        "404":
          description: Job not found
  /invoices/{jobId}:
    get:
      operationId: getInvoice
      tags: [admin]
      summary: Get invoice for a job (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice data (or null if none)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "403":
          description: Admin access required
        "404":
          description: Job not found
    patch:
      operationId: saveInvoice
      tags: [admin]
      summary: Save/update invoice for a job (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveInvoiceRequest"
      responses:
        "200":
          description: Invoice saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "403":
          description: Admin access required
        "404":
          description: Job not found
  /admin/revenue:
    get:
      operationId: getRevenueReport
      tags: [admin]
      summary: Get revenue report with filters (admin only)
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: method
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Revenue report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReportResponse"
        "403":
          description: Admin access required
  /admin/revenue/export:
    get:
      operationId: exportRevenueCsv
      tags: [admin]
      summary: Export revenue data as CSV (admin only)
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: method
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
        "403":
          description: Admin access required
  /track/{id}/{trackingToken}:
    get:
      operationId: getTrackingByToken
      tags: [tracking]
      summary: Get job tracking data by ID and token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: trackingToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tracking data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingResponse"
        "404":
          description: Tracking link not found
  /track/lookup:
    post:
      operationId: lookupTracking
      tags: [tracking]
      summary: Look up job tracking by job ID and email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackingLookupRequest"
      responses:
        "200":
          description: Tracking data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingResponse"
        "404":
          description: No matching move found
  /captain/jobs:
    get:
      operationId: listCaptainJobs
      tags: [captain]
      summary: List jobs assigned to current captain
      description: Returns all jobs assigned to the authenticated captain or admin
      responses:
        "200":
          description: List of assigned jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaptainJob"
        "401":
          description: Authentication required
        "403":
          description: Captain or admin access required
  /jobs/{jobId}/captain-status:
    patch:
      operationId: updateCaptainJobStatus
      tags: [captain]
      summary: Captain updates job operational status
      description: Captain updates job status with optional notes. Key milestones trigger customer email notifications.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptainStatusUpdateRequest"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptainJob"
        "400":
          description: Invalid status
        "403":
          description: Not assigned to this job
        "404":
          description: Job not found
  /jobs/{jobId}/captain-note:
    post:
      operationId: addCaptainNote
      tags: [captain]
      summary: Captain adds operational note to job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - notes
              properties:
                notes:
                  type: string
      responses:
        "200":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptainJob"
        "403":
          description: Not assigned to this job
        "404":
          description: Job not found
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [jobs]
      summary: Get admin dashboard stats
      description: Get stats for the admin dashboard
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /jobs/{jobId}/contracts:
    post:
      operationId: generateAndSendContract
      tags: [contracts]
      summary: Generate and send a moving contract
      description: Generates a PDF contract and sends it to the customer. Admin only.
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Contract generated and sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractRecord"
        "400":
          description: No customer email found
        "404":
          description: Job not found
        "409":
          description: Contract already exists

  /jobs/{jobId}/contract:
    get:
      operationId: getJobContract
      tags: [contracts]
      summary: Get contract for a job
      description: Returns the contract for a job if one exists, or null. Admin only.
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contract record or null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ContractRecord"
                  - type: "null"
        "404":
          description: Job not found

  /contracts/sign/{token}:
    get:
      operationId: getContractForSigning
      tags: [contracts]
      summary: Get contract data for customer signing
      description: Public endpoint to retrieve contract data using a signing token
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contract data for signing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignContractResponse"
        "404":
          description: Contract not found
    post:
      operationId: signContract
      tags: [contracts]
      summary: Submit customer signature
      description: Customer signs the contract using their signing token
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signatureData]
              properties:
                signatureData:
                  type: string
      responses:
        "200":
          description: Contract signed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  signedAt:
                    type: string
        "400":
          description: Missing signature data
        "404":
          description: Contract not found
        "409":
          description: Already signed

  /jobs/{jobId}/contracts/pdf:
    get:
      operationId: downloadContractPdf
      tags: [contracts]
      summary: Download contract as PDF
      description: Returns the contract as a downloadable PDF file. Admin only.
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Job not found

  # ─── Customer accounts (Task #44) ─────────────────────────────────────────
  /customer-auth/signup:
    post:
      operationId: customerSignup
      tags: [customer-auth]
      summary: Create a customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerSignupRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSignupResponse"
        "400":
          description: Invalid input
        "409":
          description: Email or username already in use
  /customer-auth/login:
    post:
      operationId: customerLogin
      tags: [customer-auth]
      summary: Customer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerLoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSessionResponse"
        "401":
          description: Invalid credentials
  /customer-auth/logout:
    post:
      operationId: customerLogout
      tags: [customer-auth]
