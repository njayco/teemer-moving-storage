openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Teemer Moving & Storage API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: quotes
    description: Quote request operations
  - name: jobs
    description: Moving job operations
  - name: contact
    description: Contact form operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Not authenticated
  /auth/users:
    post:
      operationId: createUser
      tags: [auth]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "403":
          description: Admin access required
        "409":
          description: Email already exists
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserListItem"
        "403":
          description: Admin access required
  /quotes:
    post:
      operationId: submitQuoteRequest
      tags: [quotes]
      summary: Submit a quote request
      description: Submit a moving quote request from a customer. Runs the pricing engine and returns the calculated estimate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
      responses:
        "201":
          description: Quote request submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
    get:
      operationId: listQuoteRequests
      tags: [quotes]
      summary: List all quote requests
      description: Get all quote requests (admin only)
      responses:
        "200":
          description: List of quote requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuoteResponse"
  /quotes/{id}:
    get:
      operationId: getQuoteRequest
      tags: [quotes]
      summary: Get a single quote request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "404":
          description: Quote not found
  /quotes/estimate-boxes:
    post:
      operationId: estimateBoxes
      tags: [quotes]
      summary: AI box count estimation
      description: Uses OpenAI to estimate the number of small and medium boxes needed based on home size and inventory selections.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateBoxesRequest"
      responses:
        "200":
          description: Box count estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateBoxesResponse"
        "503":
          description: AI estimation not configured
  /quotes/{id}/checkout:
    post:
      operationId: createCheckoutSession
      tags: [quotes]
      summary: Create Stripe Checkout Session for deposit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stripe Checkout Session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeCheckoutResponse"
        "404":
          description: Quote not found
        "503":
          description: Payment not configured
  /stripe/webhook:
    post:
      operationId: stripeWebhook
      tags: [quotes]
      summary: Stripe webhook endpoint
      description: Receives Stripe payment events and updates quote status to deposit_paid.
      responses:
        "200":
          description: Webhook received
  /quotes/{id}/status:
    patch:
      operationId: updateQuoteStatus
      tags: [quotes]
      summary: Update a quote request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteStatusRequest"
      responses:
        "200":
          description: Quote status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List available moving jobs
      description: Get available moving jobs for providers
      parameters:
        - name: area
          in: query
          schema:
            type: string
        - name: moveType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a moving job
      description: Create a new moving job from a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a specific job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    patch:
      operationId: updateJobStatus
      tags: [jobs]
      summary: Update job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobStatusRequest"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /contact:
    post:
      operationId: submitContactForm
      tags: [contact]
      summary: Submit contact form
      description: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactFormRequest"
      responses:
        "201":
          description: Contact form submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormResponse"
  /admin/email-logs/quote/{quoteId}:
    get:
      operationId: getEmailLogsByQuote
      tags: [admin]
      summary: Get email logs for a quote
      description: Returns email send history for a specific quote (admin only)
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of email logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailLog"
        "403":
          description: Admin access required
  /admin/email-logs/{jobId}:
    get:
      operationId: getEmailLogs
      tags: [admin]
      summary: Get email logs by job ID
      description: Returns email send history for a specific job (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of email logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailLog"
        "403":
          description: Admin access required
  /jobs/{jobId}/events:
    get:
      operationId: getJobEvents
      tags: [jobs]
      summary: Get job timeline events (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobStatusEvent"
        "403":
          description: Admin access required
        "404":
          description: Job not found
    post:
      operationId: createJobEvent
      tags: [jobs]
      summary: Create a job timeline event (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobEventRequest"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatusEvent"
        "403":
          description: Admin access required
        "404":
          description: Job not found
  /track/{trackingToken}:
    get:
      operationId: getTrackingByToken
      tags: [tracking]
      summary: Get job tracking data by token
      parameters:
        - name: trackingToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tracking data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingResponse"
        "404":
          description: Tracking link not found
  /track/lookup:
    post:
      operationId: lookupTracking
      tags: [tracking]
      summary: Look up job tracking by job ID and email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackingLookupRequest"
      responses:
        "200":
          description: Tracking data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingResponse"
        "404":
          description: No matching move found
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [jobs]
      summary: Get admin dashboard stats
      description: Get stats for the admin dashboard
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Inventory ─────────────────────────────────────────────────────────────
    InventoryMap:
      type: object
      description: Map of item name to quantity. Keys are item names, values are quantities.
      additionalProperties:
        type: integer
      example:
        "Sofa": 1
        "Queen bed": 2
        "Refrigerator": 1

    # ─── Quote Request ──────────────────────────────────────────────────────────
    QuoteRequest:
      type: object
      properties:
        # Contact
        contactName:
          type: string
        phone:
          type: string
        email:
          type: string
        # Move details
        moveDate:
          type: string
          description: ISO date string or formatted date
        arrivalTimeWindow:
          type: string
          description: "Preferred arrival window, e.g. '8AM–10AM'"
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        secondStop:
          type: string
          description: Optional second stop address
        storageNeeded:
          type: boolean
        storageUnitChoice:
          type: string
          description: "e.g. '5x10', '10x10'"
        additionalNotes:
          type: string
        # Legacy fields (still accepted)
        moveType:
          type: string
          description: "local or long-distance"
        residentialOrCommercial:
          type: string
          description: "residential or commercial"
        originAddress:
          type: string
        destinationAddress:
          type: string
        moveSize:
          type: string
        numberOfRooms:
          type: integer
        packingHelpNeeded:
          type: string
        specialItems:
          type: string
        # Home size
        numberOfBedrooms:
          type: integer
          minimum: 0
        numberOfLivingRooms:
          type: integer
          minimum: 0
        isFullyFurnished:
          type: boolean
        hasGarage:
          type: boolean
        hasOutdoorFurniture:
          type: boolean
        hasStairs:
          type: boolean
        hasHeavyItems:
          type: boolean
        # Inventory
        inventory:
          $ref: "#/components/schemas/InventoryMap"
        # Boxes
        boxesAlreadyPacked:
          type: integer
        needsPackingMaterials:
          type: boolean
        smallBoxes:
          type: integer
        mediumBoxes:
          type: integer
      required:
        - contactName
        - phone
        - email
        - moveDate
        - pickupAddress
        - dropoffAddress

    # ─── Quote Response ─────────────────────────────────────────────────────────
    QuoteResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [quote_requested, deposit_paid, booked]
          description: "quote_requested | deposit_paid | booked"
        createdAt:
          type: string
        # Pricing results
        crewSize:
          type: integer
        hourlyRate:
          type: number
        estimatedHours:
          type: number
        laborSubtotal:
          type: number
        materialsSubtotal:
          type: number
        totalEstimate:
          type: number
        depositAmount:
          type: number
        # Legacy compat
        estimatedPriceLow:
          type: number
        estimatedPriceHigh:
          type: number
        # Full request echo
        quoteRequest:
          $ref: "#/components/schemas/QuoteRequestEcho"
      required:
        - id
        - status
        - createdAt
        - quoteRequest

    QuoteRequestEcho:
      type: object
      description: Echo of the quote request fields as stored
      properties:
        contactName:
          type: string
        phone:
          type: string
        email:
          type: string
        moveDate:
          type: string
        arrivalTimeWindow:
          type: string
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        secondStop:
          type: string
        storageNeeded:
          type: boolean
        storageUnitChoice:
          type: string
        additionalNotes:
          type: string
        moveType:
          type: string
        residentialOrCommercial:
          type: string
        originAddress:
          type: string
        destinationAddress:
          type: string
        numberOfBedrooms:
          type: integer
        numberOfLivingRooms:
          type: integer
        isFullyFurnished:
          type: boolean
        hasGarage:
          type: boolean
        hasOutdoorFurniture:
          type: boolean
        hasStairs:
          type: boolean
        hasHeavyItems:
          type: boolean
        inventory:
          $ref: "#/components/schemas/InventoryMap"
        boxesAlreadyPacked:
          type: integer
        needsPackingMaterials:
          type: boolean
        smallBoxes:
          type: integer
        mediumBoxes:
          type: integer

    EstimateBoxesRequest:
      type: object
      properties:
        inventory:
          $ref: "#/components/schemas/InventoryMap"
        numberOfBedrooms:
          type: integer
        numberOfLivingRooms:
          type: integer
        isFullyFurnished:
          type: boolean
        notes:
          type: string
          description: Additional notes from the customer about their move

    EstimateBoxesResponse:
      type: object
      properties:
        small:
          type: integer
          description: Estimated number of small boxes
        medium:
          type: integer
          description: Estimated number of medium boxes
        note:
          type: string
          description: Confidence note from AI
      required:
        - small
        - medium
        - note

    StripeCheckoutResponse:
      type: object
      properties:
        url:
          type: string
          description: Stripe Checkout hosted URL to redirect the customer to
        sessionId:
          type: string
      required:
        - url
        - sessionId

    UpdateQuoteStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [quote_requested, deposit_paid, booked]
          description: "quote_requested | deposit_paid | booked"
      required:
        - status

    # ─── Jobs ──────────────────────────────────────────────────────────────────
    Job:
      type: object
      properties:
        id:
          type: string
        jobId:
          type: string
        customer:
          type: string
        provider:
          type: string
        pickupLocation:
          type: string
        destination:
          type: string
        moveType:
          type: string
        dateTime:
          type: string
        estimatedPayout:
          type: number
        specialRequirements:
          type: string
        jobSize:
          type: string
        status:
          type: string
          description: "Request Submitted, Quote Sent, Booking Confirmed, Crew Assigned, En Route, Loading, In Transit, Delivered, Completed"
        assignedMover:
          type: string
        truckStatus:
          type: string
        eta:
          type: string
      required:
        - id
        - pickupLocation
        - destination
        - moveType
        - dateTime
        - estimatedPayout
        - status

    CreateJobRequest:
      type: object
      properties:
        quoteId:
          type: string
        customer:
          type: string
        pickupLocation:
          type: string
        destination:
          type: string
        moveType:
          type: string
        dateTime:
          type: string
        estimatedPayout:
          type: number
        specialRequirements:
          type: string
        jobSize:
          type: string
      required:
        - customer
        - pickupLocation
        - destination
        - moveType
        - dateTime
        - estimatedPayout

    UpdateJobStatusRequest:
      type: object
      properties:
        status:
          type: string
        assignedMover:
          type: string
        truckStatus:
          type: string
        eta:
          type: string
      required:
        - status

    # ─── Contact ───────────────────────────────────────────────────────────────
    ContactFormRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        moveDate:
          type: string
        moveType:
          type: string
        origin:
          type: string
        destination:
          type: string
        message:
          type: string
      required:
        - name
        - phone
        - email
        - message

    ContactFormResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    # ─── Auth ─────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, move_captain]
      required:
        - id
        - name
        - email
        - role

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - user

    CurrentUserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - user

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, move_captain]
      required:
        - name
        - email
        - password

    UserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - user

    UserListItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - role

    # ─── Email Logs ──────────────────────────────────────────────────────────────
    EmailLog:
      type: object
      properties:
        id:
          type: integer
        quoteId:
          type: integer
          nullable: true
        jobId:
          type: integer
          nullable: true
        emailType:
          type: string
        recipient:
          type: string
        resendId:
          type: string
          nullable: true
        status:
          type: string
          enum: [sent, failed, skipped]
        sentAt:
          type: string
          nullable: true
      required:
        - id
        - emailType
        - recipient
        - status

    # ─── Admin ─────────────────────────────────────────────────────────────────
    AdminStats:
      type: object
      properties:
        totalActiveJobs:
          type: integer
        pendingRequests:
          type: integer
        jobsInTransit:
          type: integer
        completedToday:
          type: integer
        availableCrews:
          type: integer
        availableTrucks:
          type: integer
        revenueToday:
          type: number
        totalQuotes:
          type: integer
          description: Total number of quote requests submitted
        depositCollected:
          type: number
          description: Total deposit amount collected from paid/booked quotes
        revenuePipeline:
          type: number
          description: Total estimated revenue across all quotes
        weeklyRevenue:
          type: array
          items:
            type: object
            properties:
              day:
                type: string
              amount:
                type: number
            required:
              - day
              - amount
        recentJobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
      required:
        - totalActiveJobs
        - pendingRequests
        - jobsInTransit
        - completedToday
        - availableCrews
        - availableTrucks
        - revenueToday
        - totalQuotes
        - depositCollected
        - revenuePipeline
        - weeklyRevenue
        - recentJobs

    # ─── Timeline Events ───────────────────────────────────────────────────────
    JobStatusEvent:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        eventType:
          type: string
        statusLabel:
          type: string
          nullable: true
        visibleToCustomer:
          type: boolean
        notes:
          type: string
          nullable: true
        createdByUserId:
          type: integer
          nullable: true
        createdAt:
          type: string
          nullable: true
      required:
        - id
        - jobId
        - eventType

    CreateJobEventRequest:
      type: object
      properties:
        eventType:
          type: string
        statusLabel:
          type: string
        visibleToCustomer:
          type: boolean
        notes:
          type: string
      required:
        - eventType

    # ─── Tracking ──────────────────────────────────────────────────────────────
    TrackingTimelineEvent:
      type: object
      properties:
        id:
          type: integer
        eventType:
          type: string
        statusLabel:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
      required:
        - id
        - eventType

    TrackingResponse:
      type: object
      properties:
        quoteId:
          type: integer
        jobId:
          type: string
        customerName:
          type: string
        moveDate:
          type: string
        arrivalWindow:
          type: string
          nullable: true
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        status:
          type: string
          nullable: true
        totalEstimate:
          type: number
        depositPaid:
          type: number
        remainingBalance:
          type: number
        paymentStatus:
          type: string
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TrackingTimelineEvent"
      required:
        - customerName
        - moveDate
        - pickupAddress
        - dropoffAddress
        - totalEstimate
        - depositPaid
        - remainingBalance
        - paymentStatus
        - timeline

    TrackingLookupRequest:
      type: object
      properties:
        jobId:
          type: string
        email:
          type: string
      required:
        - jobId
        - email
