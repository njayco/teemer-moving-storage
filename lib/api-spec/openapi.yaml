openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Teemer Moving & Storage API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quotes
    description: Quote request operations
  - name: jobs
    description: Moving job operations
  - name: contact
    description: Contact form operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /quotes:
    post:
      operationId: submitQuoteRequest
      tags: [quotes]
      summary: Submit a quote request
      description: Submit a moving quote request from a customer. Runs the pricing engine and returns the calculated estimate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
      responses:
        "201":
          description: Quote request submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
    get:
      operationId: listQuoteRequests
      tags: [quotes]
      summary: List all quote requests
      description: Get all quote requests (admin only)
      responses:
        "200":
          description: List of quote requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuoteResponse"
  /quotes/{id}:
    get:
      operationId: getQuoteRequest
      tags: [quotes]
      summary: Get a single quote request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "404":
          description: Quote not found
  /quotes/{id}/status:
    patch:
      operationId: updateQuoteStatus
      tags: [quotes]
      summary: Update a quote request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteStatusRequest"
      responses:
        "200":
          description: Quote status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List available moving jobs
      description: Get available moving jobs for providers
      parameters:
        - name: area
          in: query
          schema:
            type: string
        - name: moveType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a moving job
      description: Create a new moving job from a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a specific job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    patch:
      operationId: updateJobStatus
      tags: [jobs]
      summary: Update job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobStatusRequest"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /contact:
    post:
      operationId: submitContactForm
      tags: [contact]
      summary: Submit contact form
      description: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactFormRequest"
      responses:
        "201":
          description: Contact form submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormResponse"
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [jobs]
      summary: Get admin dashboard stats
      description: Get stats for the admin dashboard
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Inventory ─────────────────────────────────────────────────────────────
    InventoryMap:
      type: object
      description: Map of item name to quantity. Keys are item names, values are quantities.
      additionalProperties:
        type: integer
      example:
        "Sofa": 1
        "Queen bed": 2
        "Refrigerator": 1

    # ─── Quote Request ──────────────────────────────────────────────────────────
    QuoteRequest:
      type: object
      properties:
        # Contact
        contactName:
          type: string
        phone:
          type: string
        email:
          type: string
        # Move details
        moveDate:
          type: string
          description: ISO date string or formatted date
        arrivalTimeWindow:
          type: string
          description: "Preferred arrival window, e.g. '8AM–10AM'"
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        secondStop:
          type: string
          description: Optional second stop address
        storageNeeded:
          type: boolean
        storageUnitChoice:
          type: string
          description: "e.g. '5x10', '10x10'"
        additionalNotes:
          type: string
        # Legacy fields (still accepted)
        moveType:
          type: string
          description: "local or long-distance"
        residentialOrCommercial:
          type: string
          description: "residential or commercial"
        originAddress:
          type: string
        destinationAddress:
          type: string
        moveSize:
          type: string
        numberOfRooms:
          type: integer
        packingHelpNeeded:
          type: string
        specialItems:
          type: string
        # Home size
        numberOfBedrooms:
          type: integer
          minimum: 0
        numberOfLivingRooms:
          type: integer
          minimum: 0
        isFullyFurnished:
          type: boolean
        hasGarage:
          type: boolean
        hasOutdoorFurniture:
          type: boolean
        hasStairs:
          type: boolean
        hasHeavyItems:
          type: boolean
        # Inventory
        inventory:
          $ref: "#/components/schemas/InventoryMap"
        # Boxes
        boxesAlreadyPacked:
          type: integer
        needsPackingMaterials:
          type: boolean
        smallBoxes:
          type: integer
        mediumBoxes:
          type: integer
      required:
        - contactName
        - phone
        - email
        - moveDate
        - pickupAddress
        - dropoffAddress

    # ─── Quote Response ─────────────────────────────────────────────────────────
    QuoteResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [quote_requested, deposit_paid, booked]
          description: "quote_requested | deposit_paid | booked"
        createdAt:
          type: string
        # Pricing results
        crewSize:
          type: integer
        hourlyRate:
          type: number
        estimatedHours:
          type: number
        laborSubtotal:
          type: number
        materialsSubtotal:
          type: number
        totalEstimate:
          type: number
        depositAmount:
          type: number
        # Legacy compat
        estimatedPriceLow:
          type: number
        estimatedPriceHigh:
          type: number
        # Full request echo
        quoteRequest:
          $ref: "#/components/schemas/QuoteRequestEcho"
      required:
        - id
        - status
        - createdAt
        - quoteRequest

    QuoteRequestEcho:
      type: object
      description: Echo of the quote request fields as stored
      properties:
        contactName:
          type: string
        phone:
          type: string
        email:
          type: string
        moveDate:
          type: string
        arrivalTimeWindow:
          type: string
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        secondStop:
          type: string
        storageNeeded:
          type: boolean
        storageUnitChoice:
          type: string
        additionalNotes:
          type: string
        moveType:
          type: string
        residentialOrCommercial:
          type: string
        originAddress:
          type: string
        destinationAddress:
          type: string
        numberOfBedrooms:
          type: integer
        numberOfLivingRooms:
          type: integer
        isFullyFurnished:
          type: boolean
        hasGarage:
          type: boolean
        hasOutdoorFurniture:
          type: boolean
        hasStairs:
          type: boolean
        hasHeavyItems:
          type: boolean
        inventory:
          $ref: "#/components/schemas/InventoryMap"
        boxesAlreadyPacked:
          type: integer
        needsPackingMaterials:
          type: boolean
        smallBoxes:
          type: integer
        mediumBoxes:
          type: integer

    UpdateQuoteStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [quote_requested, deposit_paid, booked]
          description: "quote_requested | deposit_paid | booked"
      required:
        - status

    # ─── Jobs ──────────────────────────────────────────────────────────────────
    Job:
      type: object
      properties:
        id:
          type: string
        jobId:
          type: string
        customer:
          type: string
        provider:
          type: string
        pickupLocation:
          type: string
        destination:
          type: string
        moveType:
          type: string
        dateTime:
          type: string
        estimatedPayout:
          type: number
        specialRequirements:
          type: string
        jobSize:
          type: string
        status:
          type: string
          description: "Request Submitted, Quote Sent, Booking Confirmed, Crew Assigned, En Route, Loading, In Transit, Delivered, Completed"
        assignedMover:
          type: string
        truckStatus:
          type: string
        eta:
          type: string
      required:
        - id
        - pickupLocation
        - destination
        - moveType
        - dateTime
        - estimatedPayout
        - status

    CreateJobRequest:
      type: object
      properties:
        quoteId:
          type: string
        customer:
          type: string
        pickupLocation:
          type: string
        destination:
          type: string
        moveType:
          type: string
        dateTime:
          type: string
        estimatedPayout:
          type: number
        specialRequirements:
          type: string
        jobSize:
          type: string
      required:
        - customer
        - pickupLocation
        - destination
        - moveType
        - dateTime
        - estimatedPayout

    UpdateJobStatusRequest:
      type: object
      properties:
        status:
          type: string
        assignedMover:
          type: string
        truckStatus:
          type: string
        eta:
          type: string
      required:
        - status

    # ─── Contact ───────────────────────────────────────────────────────────────
    ContactFormRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        moveDate:
          type: string
        moveType:
          type: string
        origin:
          type: string
        destination:
          type: string
        message:
          type: string
      required:
        - name
        - phone
        - email
        - message

    ContactFormResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    # ─── Admin ─────────────────────────────────────────────────────────────────
    AdminStats:
      type: object
      properties:
        totalActiveJobs:
          type: integer
        pendingRequests:
          type: integer
        jobsInTransit:
          type: integer
        completedToday:
          type: integer
        availableCrews:
          type: integer
        availableTrucks:
          type: integer
        revenueToday:
          type: number
        weeklyRevenue:
          type: array
          items:
            type: object
            properties:
              day:
                type: string
              amount:
                type: number
            required:
              - day
              - amount
        recentJobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
      required:
        - totalActiveJobs
        - pendingRequests
        - jobsInTransit
        - completedToday
        - availableCrews
        - availableTrucks
        - revenueToday
        - weeklyRevenue
        - recentJobs
