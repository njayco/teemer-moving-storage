openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Teemer Moving & Storage API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: quotes
    description: Quote request operations
  - name: jobs
    description: Moving job operations
  - name: contact
    description: Contact form operations
  - name: admin
    description: Admin operations
  - name: captain
    description: Move captain operations
  - name: contracts
    description: Digital contract operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Not authenticated
  /auth/users:
    post:
      operationId: createUser
      tags: [auth]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "403":
          description: Admin access required
        "409":
          description: Email already exists
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserListItem"
        "403":
          description: Admin access required
  /quotes:
    post:
      operationId: submitQuoteRequest
      tags: [quotes]
      summary: Submit a quote request
      description: Submit a moving quote request from a customer. Runs the pricing engine and returns the calculated estimate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
      responses:
        "201":
          description: Quote request submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
    get:
      operationId: listQuoteRequests
      tags: [quotes]
      summary: List all quote requests
      description: Get all quote requests (admin only)
      responses:
        "200":
          description: List of quote requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuoteResponse"
  /quotes/{id}:
    get:
      operationId: getQuoteRequest
      tags: [quotes]
      summary: Get a single quote request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "404":
          description: Quote not found
  /quotes/estimate-boxes:
    post:
      operationId: estimateBoxes
      tags: [quotes]
      summary: AI box count estimation
      description: Uses OpenAI to estimate the number of small and medium boxes needed based on home size and inventory selections.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateBoxesRequest"
      responses:
        "200":
          description: Box count estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateBoxesResponse"
        "503":
          description: AI estimation not configured
  /quotes/{id}/checkout:
    post:
      operationId: createCheckoutSession
      tags: [quotes]
      summary: Create Stripe Checkout Session for deposit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stripe Checkout Session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeCheckoutResponse"
        "404":
          description: Quote not found
        "503":
          description: Payment not configured
  /stripe/webhook:
    post:
      operationId: stripeWebhook
      tags: [quotes]
      summary: Stripe webhook endpoint
      description: Receives Stripe payment events and updates quote status to deposit_paid.
      responses:
        "200":
          description: Webhook received
  /quotes/{id}/status:
    patch:
      operationId: updateQuoteStatus
      tags: [quotes]
      summary: Update a quote request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteStatusRequest"
      responses:
        "200":
          description: Quote status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List available moving jobs
      description: Get jobs with optional status filter and text search
      parameters:
        - name: status
          in: query
          description: Filter by job status (e.g. pending, scheduled, in_progress, complete, cancelled)
          schema:
            type: string
        - name: search
          in: query
          description: Search by customer name, job ID, address, date, or assigned mover
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a moving job
      description: Create a new moving job from a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a specific job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    patch:
      operationId: updateJobStatus
      tags: [jobs]
      summary: Update job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobStatusRequest"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /contact:
    post:
      operationId: submitContactForm
      tags: [contact]
      summary: Submit contact form
      description: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactFormRequest"
      responses:
        "201":
          description: Contact form submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormResponse"
  /admin/email-logs/quote/{quoteId}:
    get:
      operationId: getEmailLogsByQuote
      tags: [admin]
      summary: Get email logs for a quote
      description: Returns email send history for a specific quote (admin only)
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of email logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailLog"
        "403":
          description: Admin access required
  /admin/email-logs/{jobId}:
    get:
      operationId: getEmailLogs
      tags: [admin]
      summary: Get email logs by job ID
      description: Returns email send history for a specific job (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of email logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailLog"
        "403":
          description: Admin access required
  /jobs/{jobId}/events:
    get:
      operationId: getJobEvents
      tags: [jobs]
      summary: Get job timeline events (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
        - name: customerOnly
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobStatusEvent"
        "403":
          description: Admin access required
        "404":
          description: Job not found
    post:
      operationId: createJobEvent
      tags: [jobs]
      summary: Create a job timeline event (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobEventRequest"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatusEvent"
        "403":
          description: Admin access required
        "404":
          description: Job not found
  /jobs/{jobId}/send-invoice:
    post:
      operationId: sendJobInvoice
      tags: [jobs]
      summary: Send remaining balance invoice to customer (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: No customer email or bad request
        "403":
          description: Admin access required
        "404":
          description: Job not found
  /jobs/{jobId}/email-customer:
    post:
      operationId: emailJobCustomer
      tags: [jobs]
      summary: Send email to job customer (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                subject:
                  type: string
                message:
                  type: string
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: No customer email or bad request
        "403":
          description: Admin access required
        "404":
          description: Job not found
  /invoices/{jobId}:
    get:
      operationId: getInvoice
      tags: [admin]
      summary: Get invoice for a job (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice data (or null if none)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "403":
          description: Admin access required
        "404":
          description: Job not found
    patch:
      operationId: saveInvoice
      tags: [admin]
      summary: Save/update invoice for a job (admin only)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveInvoiceRequest"
      responses:
        "200":
          description: Invoice saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "403":
          description: Admin access required
        "404":
          description: Job not found
  /admin/revenue:
    get:
      operationId: getRevenueReport
      tags: [admin]
      summary: Get revenue report with filters (admin only)
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: method
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Revenue report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReportResponse"
        "403":
          description: Admin access required
  /admin/revenue/export:
    get:
      operationId: exportRevenueCsv
      tags: [admin]
      summary: Export revenue data as CSV (admin only)
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: method
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
        "403":
          description: Admin access required
  /track/{id}/{trackingToken}:
    get:
      operationId: getTrackingByToken
      tags: [tracking]
      summary: Get job tracking data by ID and token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: trackingToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tracking data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingResponse"
        "404":
          description: Tracking link not found
  /track/lookup:
    post:
      operationId: lookupTracking
      tags: [tracking]
      summary: Look up job tracking by job ID and email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackingLookupRequest"
      responses:
        "200":
          description: Tracking data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingResponse"
        "404":
          description: No matching move found
  /captain/jobs:
    get:
      operationId: listCaptainJobs
      tags: [captain]
      summary: List jobs assigned to current captain
      description: Returns all jobs assigned to the authenticated captain or admin
      responses:
        "200":
          description: List of assigned jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaptainJob"
        "401":
          description: Authentication required
        "403":
          description: Captain or admin access required
  /jobs/{jobId}/captain-status:
    patch:
      operationId: updateCaptainJobStatus
      tags: [captain]
      summary: Captain updates job operational status
      description: Captain updates job status with optional notes. Key milestones trigger customer email notifications.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptainStatusUpdateRequest"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptainJob"
        "400":
          description: Invalid status
        "403":
          description: Not assigned to this job
        "404":
          description: Job not found
  /jobs/{jobId}/captain-note:
    post:
      operationId: addCaptainNote
      tags: [captain]
      summary: Captain adds operational note to job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - notes
              properties:
                notes:
                  type: string
      responses:
        "200":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptainJob"
        "403":
          description: Not assigned to this job
        "404":
          description: Job not found
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [jobs]
      summary: Get admin dashboard stats
      description: Get stats for the admin dashboard
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /jobs/{jobId}/contracts:
    post:
      operationId: generateAndSendContract
      tags: [contracts]
      summary: Generate and send a moving contract
      description: Generates a PDF contract and sends it to the customer. Admin only.
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Contract generated and sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractRecord"
        "400":
          description: No customer email found
        "404":
          description: Job not found
        "409":
          description: Contract already exists

  /jobs/{jobId}/contract:
    get:
      operationId: getJobContract
      tags: [contracts]
      summary: Get contract for a job
      description: Returns the contract for a job if one exists. Admin only.
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contract record or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractRecord"
        "404":
          description: Job not found

  /contracts/sign/{token}:
    get:
      operationId: getContractForSigning
      tags: [contracts]
      summary: Get contract data for customer signing
      description: Public endpoint to retrieve contract data using a signing token
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contract data for signing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignContractResponse"
        "404":
          description: Contract not found
    post:
      operationId: signContract
      tags: [contracts]
      summary: Submit customer signature
      description: Customer signs the contract using their signing token
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signatureData]
              properties:
                signatureData:
                  type: string
      responses:
        "200":
          description: Contract signed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  signedAt:
                    type: string
        "400":
          description: Missing signature data
        "404":
          description: Contract not found
        "409":
          description: Already signed

  /jobs/{jobId}/contracts/pdf:
    get:
      operationId: downloadContractPdf
      tags: [contracts]
      summary: Download contract as PDF
      description: Returns the contract as a downloadable PDF file. Admin only.
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Job not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Inventory ─────────────────────────────────────────────────────────────
    InventoryMap:
      type: object
      description: Map of item name to quantity. Keys are item names, values are quantities.
      additionalProperties:
        type: integer
      example:
        "Sofa": 1
        "Queen bed": 2
        "Refrigerator": 1

    # ─── Quote Request ──────────────────────────────────────────────────────────
    QuoteRequest:
      type: object
      properties:
        # Contact
        contactName:
          type: string
        phone:
          type: string
        email:
          type: string
        # Move details
        moveDate:
          type: string
          description: ISO date string or formatted date
        arrivalTimeWindow:
          type: string
          description: "Preferred arrival window, e.g. '8AM–10AM'"
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        secondStop:
          type: string
          description: Optional second stop address
        storageNeeded:
          type: boolean
        storageUnitChoice:
          type: string
          description: "e.g. '5x10', '10x10'"
        additionalNotes:
          type: string
        # Legacy fields (still accepted)
        moveType:
          type: string
          description: "local or long-distance"
        residentialOrCommercial:
          type: string
          description: "residential or commercial"
        originAddress:
          type: string
        destinationAddress:
          type: string
        moveSize:
          type: string
        numberOfRooms:
          type: integer
        packingHelpNeeded:
          type: string
        specialItems:
          type: string
        # Home size
        numberOfBedrooms:
          type: integer
          minimum: 0
        numberOfLivingRooms:
          type: integer
          minimum: 0
        isFullyFurnished:
          type: boolean
        hasGarage:
          type: boolean
        hasOutdoorFurniture:
          type: boolean
        hasStairs:
          type: boolean
        hasHeavyItems:
          type: boolean
        # Piano
        pianoType:
          type: string
          enum: [none, upright, grand]
        pianoFloor:
          type: string
          enum: [ground, stairs]
        # Commercial
        isCommercial:
          type: boolean
          description: "true if this is a commercial move"
        commercialBusinessType:
          type: string
          description: "e.g. Office, Retail Store, Art Gallery, Warehouse, Restaurant/Café, Medical Office, Hotel/Hospitality, Other"
        commercialSizeTier:
          type: string
          enum: [small, medium, large, enterprise]
          description: "small (<500 sqft), medium (500-1000 sqft), large (1000-2500 sqft), enterprise (2500+ sqft)"
        # Inventory
        inventory:
          $ref: "#/components/schemas/InventoryMap"
        # Boxes
        boxesAlreadyPacked:
          type: integer
        needsPackingMaterials:
          type: boolean
        smallBoxes:
          type: integer
        mediumBoxes:
          type: integer
      required:
        - contactName
        - phone
        - email
        - moveDate
        - pickupAddress
        - dropoffAddress

    # ─── Quote Response ─────────────────────────────────────────────────────────
    QuoteResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [quote_requested, deposit_paid, booked]
          description: "quote_requested | deposit_paid | booked"
        createdAt:
          type: string
        # Pricing results
        crewSize:
          type: integer
        hourlyRate:
          type: number
        estimatedHours:
          type: number
        laborSubtotal:
          type: number
        materialsSubtotal:
          type: number
        pianoSurcharge:
          type: number
        commercialAdjustment:
          type: number
          description: "Amount added above residential estimate for commercial moves"
        totalEstimate:
          type: number
        depositAmount:
          type: number
        # Legacy compat
        estimatedPriceLow:
          type: number
        estimatedPriceHigh:
          type: number
        # Full request echo
        quoteRequest:
          $ref: "#/components/schemas/QuoteRequestEcho"
      required:
        - id
        - status
        - createdAt
        - quoteRequest

    QuoteRequestEcho:
      type: object
      description: Echo of the quote request fields as stored
      properties:
        contactName:
          type: string
        phone:
          type: string
        email:
          type: string
        moveDate:
          type: string
        arrivalTimeWindow:
          type: string
        pickupAddress:
          type: string
        dropoffAddress:
          type: string
        secondStop:
          type: string
        storageNeeded:
          type: boolean
